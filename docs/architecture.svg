<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" role="img" aria-labelledby="title desc" font-family="'Segoe UI',system-ui,-apple-system,sans-serif">
  <title id="title">lolhelper 系統架構</title>
  <desc id="desc">Riot Match-V5 API 經 BFS 爬蟲與 ARQ worker 寫入 PostgreSQL 與 Redis，FastAPI 統計引擎服務 Next.js 網站與 Electron 桌面客戶端。</desc>
  <defs>
    <marker id="arw" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#7c8aa5"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="620" rx="14" fill="#0f1623"/>
  <rect x="0" y="0" width="920" height="620" rx="14" fill="none" stroke="#283449" stroke-width="1.5"/>

  <text x="40" y="50" fill="#c8aa6e" font-size="26" font-weight="600">lolhelper · 系統架構</text>
  <text x="40" y="78" fill="#8a96ab" font-size="15">Riot 資料聚合 → 統計引擎(Wilson 分級) → Web / 桌面客戶端</text>

  <!-- band labels -->
  <text x="40" y="135" fill="#5d6b82" font-size="12" letter-spacing="1">資料源</text>
  <text x="40" y="232" fill="#5d6b82" font-size="12" letter-spacing="1">擷取</text>
  <text x="40" y="330" fill="#5d6b82" font-size="12" letter-spacing="1">儲存</text>
  <text x="40" y="430" fill="#5d6b82" font-size="12" letter-spacing="1">後端</text>
  <text x="40" y="540" fill="#5d6b82" font-size="12" letter-spacing="1">客戶端</text>

  <!-- Band 1: source -->
  <rect x="330" y="104" width="280" height="58" rx="8" fill="#16243a" stroke="#3a5a8c" stroke-width="1.5"/>
  <text x="470" y="130" fill="#dbe4f0" font-size="16" font-weight="500" text-anchor="middle">Riot Match-V5 API</text>
  <text x="470" y="150" fill="#8a96ab" font-size="12.5" text-anchor="middle">Arena queue 1700</text>

  <!-- Band 2: ingestion -->
  <rect x="120" y="200" width="300" height="58" rx="8" fill="#10261f" stroke="#2f7d63" stroke-width="1.5"/>
  <text x="270" y="226" fill="#dbe4f0" font-size="16" font-weight="500" text-anchor="middle">BFS puuid 爬蟲</text>
  <text x="270" y="246" fill="#8a96ab" font-size="12.5" text-anchor="middle">4-cluster 並行 · rate-limit</text>

  <rect x="500" y="200" width="300" height="58" rx="8" fill="#10261f" stroke="#2f7d63" stroke-width="1.5"/>
  <text x="650" y="226" fill="#dbe4f0" font-size="16" font-weight="500" text-anchor="middle">ARQ 非同步 worker</text>
  <text x="650" y="246" fill="#8a96ab" font-size="12.5" text-anchor="middle">crawl · aggregate · meta</text>

  <!-- Band 3: storage -->
  <rect x="120" y="298" width="300" height="58" rx="8" fill="#2a1e10" stroke="#9a7b3f" stroke-width="1.5"/>
  <text x="270" y="324" fill="#dbe4f0" font-size="16" font-weight="500" text-anchor="middle">PostgreSQL</text>
  <text x="270" y="344" fill="#8a96ab" font-size="12.5" text-anchor="middle">月分區 matches</text>

  <rect x="500" y="298" width="300" height="58" rx="8" fill="#2a1e10" stroke="#9a7b3f" stroke-width="1.5"/>
  <text x="650" y="324" fill="#dbe4f0" font-size="16" font-weight="500" text-anchor="middle">Redis</text>
  <text x="650" y="344" fill="#8a96ab" font-size="12.5" text-anchor="middle">快取 + ARQ 佇列</text>

  <!-- Band 4: backend -->
  <rect x="210" y="396" width="500" height="64" rx="8" fill="#16243a" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="460" y="424" fill="#dbe4f0" font-size="16.5" font-weight="500" text-anchor="middle">FastAPI · /api/v1</text>
  <text x="460" y="445" fill="#8a96ab" font-size="12.5" text-anchor="middle">auth · meta · stats　+　Wilson 信心區間分級</text>
  <rect x="724" y="406" width="156" height="44" rx="8" fill="#1d1730" stroke="#7a5cc0" stroke-width="1.3"/>
  <text x="802" y="426" fill="#cfc2ee" font-size="12.5" font-weight="500" text-anchor="middle">Google OAuth</text>
  <text x="802" y="442" fill="#9b8fc4" font-size="11.5" text-anchor="middle">+ JWT cookie</text>

  <!-- Band 5: clients -->
  <rect x="120" y="500" width="300" height="58" rx="8" fill="#16243a" stroke="#3a5a8c" stroke-width="1.5"/>
  <text x="270" y="526" fill="#dbe4f0" font-size="16" font-weight="500" text-anchor="middle">Next.js 網站</text>
  <text x="270" y="546" fill="#8a96ab" font-size="12.5" text-anchor="middle">App Router · ISR</text>

  <rect x="500" y="500" width="300" height="58" rx="8" fill="#16243a" stroke="#3a5a8c" stroke-width="1.5"/>
  <text x="650" y="526" fill="#dbe4f0" font-size="16" font-weight="500" text-anchor="middle">Electron .exe</text>
  <text x="650" y="546" fill="#8a96ab" font-size="12.5" text-anchor="middle">LCU 偵測 · overlay</text>

  <!-- arrows -->
  <line x1="430" y1="162" x2="290" y2="200" stroke="#7c8aa5" stroke-width="1.6" marker-end="url(#arw)"/>
  <line x1="420" y1="229" x2="500" y2="229" stroke="#7c8aa5" stroke-width="1.6" marker-end="url(#arw)"/>
  <line x1="270" y1="258" x2="270" y2="298" stroke="#7c8aa5" stroke-width="1.6" marker-end="url(#arw)"/>
  <line x1="650" y1="258" x2="650" y2="298" stroke="#7c8aa5" stroke-width="1.6" marker-end="url(#arw)"/>
  <line x1="290" y1="356" x2="380" y2="396" stroke="#7c8aa5" stroke-width="1.6" marker-end="url(#arw)"/>
  <line x1="630" y1="356" x2="545" y2="396" stroke="#7c8aa5" stroke-width="1.6" marker-end="url(#arw)"/>
  <line x1="400" y1="460" x2="300" y2="500" stroke="#7c8aa5" stroke-width="1.6" marker-end="url(#arw)"/>
  <line x1="520" y1="460" x2="620" y2="500" stroke="#7c8aa5" stroke-width="1.6" marker-end="url(#arw)"/>
  <path d="M712 520 C 840 512, 838 470, 712 446" fill="none" stroke="#5d6b82" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arw)"/>
  <text x="812" y="492" fill="#7c8aa5" font-size="11.5" text-anchor="middle">上傳 Mayhem</text>
</svg>
